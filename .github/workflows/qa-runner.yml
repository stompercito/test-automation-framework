name: QA Runner

run-name: >-
  QA | suite=${{ inputs.suite || 'all' }} | actor=${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Test category
        required: true
        type: choice
        default: all
        options:
          - all
          - functional
          - non-functional
          - ui
          - api
          - accessibility
          - performance
      base_url:
        description: Base URL for UI/non-functional suites
        required: false
        type: string
        default: 'https://wmxrwq14uc.execute-api.us-east-1.amazonaws.com/Prod/Account/Login'
      api_base_url:
        description: Base URL for API suites
        required: false
        type: string
        default: 'https://wmxrwq14uc.execute-api.us-east-1.amazonaws.com/Prod'

permissions:
  contents: read
  actions: read

jobs:
  ui:
    name: Functional UI Tests
    if: ${{ inputs.suite == 'all' || inputs.suite == 'functional' || inputs.suite == 'ui' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run functional UI project (Cucumber)
        env:
          BASE_URL: ${{ inputs.base_url }}
          API_BASE_URL: ${{ inputs.api_base_url }}
          PAYLOCITY_USERNAME: ${{ secrets.PAYLOCITY_USERNAME }}
          PAYLOCITY_PASSWORD: ${{ secrets.PAYLOCITY_PASSWORD }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
          API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
          HEADLESS: 'true'
          PW_VIDEO_MODE: 'retain-on-failure'
          CI: true
        run: npm run test:bdd:ui

      - name: Upload UI Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-cucumber-report
          path: reports/html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: reports/allure-results
          if-no-files-found: warn
          retention-days: 14

  api:
    name: Functional API Tests
    if: ${{ inputs.suite == 'all' || inputs.suite == 'functional' || inputs.suite == 'api' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run functional API project (Cucumber)
        env:
          API_BASE_URL: ${{ inputs.api_base_url }}
          PAYLOCITY_USERNAME: ${{ secrets.PAYLOCITY_USERNAME }}
          PAYLOCITY_PASSWORD: ${{ secrets.PAYLOCITY_PASSWORD }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
          API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
          HEADLESS: 'true'
          PW_VIDEO_MODE: 'retain-on-failure'
          CI: true
        run: npm run test:bdd:api

      - name: Upload API Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-cucumber-report
          path: reports/html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: reports/allure-results
          if-no-files-found: warn
          retention-days: 14

  accessibility:
    name: Accessibility Tests
    if: ${{ inputs.suite == 'all' || inputs.suite == 'non-functional' || inputs.suite == 'accessibility' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run accessibility project
        env:
          BASE_URL: ${{ inputs.base_url }}
          API_BASE_URL: ${{ inputs.api_base_url }}
          PAYLOCITY_USERNAME: ${{ secrets.PAYLOCITY_USERNAME }}
          PAYLOCITY_PASSWORD: ${{ secrets.PAYLOCITY_PASSWORD }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
          API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
          HEADLESS: 'true'
          PW_VIDEO_MODE: 'retain-on-failure'
          CI: true
        run: npm run test:accessibility

      - name: Upload accessibility Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-playwright-report
          path: reports/playwright-html
          retention-days: 14

      - name: Upload accessibility Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-allure-results
          path: reports/allure-results
          retention-days: 14

  performance:
    name: Performance Tests
    if: ${{ inputs.suite == 'all' || inputs.suite == 'non-functional' || inputs.suite == 'performance' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run performance project (Cucumber)
        env:
          BASE_URL: ${{ inputs.base_url }}
          API_BASE_URL: ${{ inputs.api_base_url }}
          PAYLOCITY_USERNAME: ${{ secrets.PAYLOCITY_USERNAME }}
          PAYLOCITY_PASSWORD: ${{ secrets.PAYLOCITY_PASSWORD }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          API_AUTH_USERNAME: ${{ secrets.API_AUTH_USERNAME }}
          API_AUTH_PASSWORD: ${{ secrets.API_AUTH_PASSWORD }}
          HEADLESS: 'true'
          PW_VIDEO_MODE: 'retain-on-failure'
          CI: true
        run: npm run test:bdd:performance

      - name: Upload performance Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-cucumber-report
          path: reports/html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload performance Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-allure-results
          path: reports/allure-results
          if-no-files-found: warn
          retention-days: 14
