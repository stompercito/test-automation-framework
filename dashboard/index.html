<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1>QA Dashboard</h1>
        <p>Run functional/non-functional suites, track execution status, review artifacts, and triage failures.</p>
      </header>

      <section class="card">
        <h2>Runner Settings</h2>
        <div class="grid" id="settingsGrid"></div>
        <div class="row">
          <button id="launchBtn" class="primary">Launch Test Run</button>
          <button id="launchGithubBtn" class="secondary">Run in GitHub (no PAT)</button>
          <button id="refreshBtn" class="secondary">Refresh</button>
          <label class="check">
            <input type="checkbox" id="autoRefresh" checked />
            Auto refresh (10s)
          </label>
        </div>
        <p id="statusMessage" class="status"></p>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="layout">
        <article class="card">
          <h2>Recent Runs</h2>
          <div id="runList" class="run-list"></div>
        </article>

        <article class="card">
          <h2>Run Details</h2>
          <div id="runDetails"></div>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
